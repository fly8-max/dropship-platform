<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>VitalEdge Platform</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',system-ui,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}nav{background:#0f172a;color:#fff;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:60px}.nav-brand{font-size:1.2rem;font-weight:800}.nav-brand span{color:#3b82f6}.nav-user{display:flex;align-items:center;gap:16px;font-size:.85rem;color:#94a3b8}.nav-user a{color:#94a3b8;text-decoration:none;padding:6px 12px;border:1px solid #334155;border-radius:6px}.nav-user a:hover{color:#fff;border-color:#3b82f6}main{max-width:1200px;margin:0 auto;padding:32px 24px}h2{font-size:1.4rem;font-weight:700;margin-bottom:20px;color:#0f172a}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:32px}.card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.08)}.card-label{font-size:.8rem;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.05em}.card-value{font-size:2rem;font-weight:800;margin-top:6px;color:#0f172a}.card-value.green{color:#16a34a}.card-value.blue{color:#2563eb}.actions{display:flex;gap:12px;margin-bottom:28px;flex-wrap:wrap;align-items:center}select{padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.9rem;background:#fff;outline:none;min-width:200px}.btn{padding:11px 22px;border:none;border-radius:8px;font-size:.9rem;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px}.btn-primary{background:#3b82f6;color:#fff}.btn-primary:hover{background:#2563eb}.btn-primary:disabled{background:#93c5fd;cursor:not-allowed}#toast{position:fixed;bottom:28px;right:28px;background:#0f172a;color:#fff;padding:14px 22px;border-radius:10px;font-size:.9rem;box-shadow:0 8px 24px rgba(0,0,0,.3);transform:translateY(120px);opacity:0;transition:.3s;max-width:360px;z-index:999}#toast.show{transform:translateY(0);opacity:1}#toast.success{border-left:4px solid #22c55e}#toast.error{border-left:4px solid #ef4444}.stores-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:32px}.store-card{background:#fff;border-radius:12px;padding:20px 24px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:4px solid #e2e8f0}.store-card.active{border-left-color:#22c55e}.store-name{font-weight:700;font-size:1rem}.store-niche{font-size:.82rem;color:#64748b;margin-top:2px}.store-meta{display:flex;gap:16px;margin-top:12px;font-size:.82rem;color:#475569}.store-meta b{color:#0f172a}.pill{display:inline-block;padding:2px 10px;border-radius:20px;font-size:.75rem;font-weight:700;text-transform:uppercase}.pill.active{background:#dcfce7;color:#16a34a}.table-wrap{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:32px}table{width:100%;border-collapse:collapse;font-size:.88rem}thead{background:#f8fafc}th{padding:14px 20px;text-align:left;font-weight:700;color:#64748b;font-size:.78rem;text-transform:uppercase}td{padding:14px 20px;border-top:1px solid #f1f5f9;color:#374151}.sim-badge{background:#ede9fe;color:#7c3aed;font-size:.72rem;font-weight:700;padding:2px 7px;border-radius:4px;margin-left:6px}.empty{text-align:center;padding:40px;color:#94a3b8}.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}</style></head><body><nav><div class="nav-brand">Vital<span>Edge</span> <span style="color:#475569;font-weight:400;font-size:.9rem">Platform</span></div><div class="nav-user"><span>{{ user }}</span><a href="/logout">Sign out</a></div></nav><main><h2>Overview</h2><div class="cards"><div class="card"><div class="card-label">Total Stores</div><div class="card-value blue" id="s-stores">-</div></div><div class="card"><div class="card-label">Active Stores</div><div class="card-value green" id="s-active">-</div></div><div class="card"><div class="card-label">Total Orders</div><div class="card-value" id="s-orders">-</div></div><div class="card"><div class="card-label">Total Revenue</div><div class="card-value green" id="s-revenue">-</div></div><div class="card"><div class="card-label">Commission</div><div class="card-value blue" id="s-commission">-</div></div></div><div class="actions"><select id="store-select"><option value="">All stores (random)</option></select><button class="btn btn-primary" id="sim-btn" onclick="simulateSale()">🛒 Simulate a test sale</button></div><h2>Your Stores</h2><div class="stores-grid" id="stores-grid"></div><h2>Recent Orders</h2><div class="table-wrap"><table><thead><tr><th>Order ID</th><th>Store</th><th>Product</th><th>Qty</th><th>Revenue</th><th>COGS</th><th>Commission</th><th>Date</th></tr></thead><tbody id="orders-body"><tr><td colspan="8" class="empty">Loading...</td></tr></tbody></table></div></main><div id="toast"></div><script>const fmt=n=>'$'+Number(n).toFixed(2);const fmtDate=s=>new Date(s).toLocaleString();async function api(path,opts){const r=await fetch(path,opts);return r.json();}async function loadSummary(){const d=await api('/api/summary');document.getElementById('s-stores').textContent=d.total_stores;document.getElementById('s-active').textContent=d.active_stores;document.getElementById('s-orders').textContent=d.total_orders;document.getElementById('s-revenue').textContent=fmt(d.total_revenue);document.getElementById('s-commission').textContent=fmt(d.total_commission);}async function loadStores(){const stores=await api('/api/stores');const sel=document.getElementById('store-select');sel.innerHTML='<option value="">All stores (random)</option>';stores.forEach(s=>{const o=document.createElement('option');o.value=s.id;o.textContent=s.name;sel.appendChild(o);});const grid=document.getElementById('stores-grid');grid.innerHTML='';stores.forEach(s=>{grid.innerHTML+=`<div class="store-card ${s.status}"><div style="display:flex;justify-content:space-between;align-items:start"><div><div class="store-name">${s.name}</div><div class="store-niche">${s.niche}</div></div><span class="pill ${s.status}">${s.status}</span></div><div class="store-meta"><div>Orders <b>${s.orders||0}</b></div><div>Revenue <b>${fmt(s.revenue||0)}</b></div></div></div>`;});}async function loadOrders(){const orders=await api('/api/orders');const tbody=document.getElementById('orders-body');if(!orders.length){tbody.innerHTML='<tr><td colspan="8" class="empty">No orders yet — click Simulate a test sale!</td></tr>';return;}tbody.innerHTML=orders.map(o=>`<tr><td><b>${o.id}</b>${o.simulated?'<span class="sim-badge">SIM</span>':''}</td><td>${o.store_name}</td><td>${o.product}</td><td>${o.qty}</td><td style="color:#16a34a;font-weight:700">${fmt(o.revenue)}</td><td style="color:#64748b">${fmt(o.cogs)}</td><td style="color:#2563eb;font-weight:700">${fmt(o.commission)}</td><td style="color:#94a3b8;font-size:.82rem">${fmtDate(o.created)}</td></tr>`).join('');}function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className='show '+type;setTimeout(()=>t.className='',3500);}async function simulateSale(){const btn=document.getElementById('sim-btn');const storeId=document.getElementById('store-select').value;btn.disabled=true;btn.innerHTML='<div class="spinner"></div> Simulating...';try{const res=await api('/api/simulate-sale',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(storeId?{store_id:storeId}:{})});if(res.success){const o=res.order;showToast('Sale! '+o.product+' x'+o.qty+' - Revenue: '+fmt(o.revenue)+' | Commission: '+fmt(o.commission));await Promise.all([loadSummary(),loadStores(),loadOrders()]);}else{showToast('Error: '+(res.error||'unknown'),'error');}}catch(e){showToast('Network error','error');}btn.disabled=false;btn.innerHTML='🛒 Simulate a test sale';}loadSummary();loadStores();loadOrders();</script></body></html>
