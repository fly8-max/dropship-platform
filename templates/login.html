<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>VitalEdge Platform</title><style>*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%);font-family:'Segoe UI',sans-serif}.card{background:#fff;border-radius:16px;padding:48px 40px;width:380px;box-shadow:0 24px 64px rgba(0,0,0,.4)}.logo{text-align:center;margin-bottom:32px}.logo h1{font-size:1.8rem;font-weight:800;color:#0f172a}.logo span{color:#3b82f6}.logo p{color:#64748b;font-size:.9rem;margin-top:4px}label{display:block;font-size:.85rem;font-weight:600;color:#374151;margin-bottom:6px}input{width:100%;padding:12px 14px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:.95rem;outline:none}.field{margin-bottom:20px}.btn{width:100%;padding:13px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:8px}.btn:hover{background:#2563eb}.error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;border-radius:8px;padding:10px 14px;font-size:.85rem;margin-bottom:20px}.hint{text-align:center;color:#94a3b8;font-size:.8rem;margin-top:20px}</style></head><body><div class="card"><div class="logo"><h1>Vital<span>Edge</span></h1><p>Dropship Platform</p></div>{% if error %}<div class="error">{{ error }}</div>{% endif %}<form method="POST"><div class="field"><label>Email</label><input type="email" name="email" placeholder="demo@demo.com" required></div><div class="field"><label>Password</label><input type="password" name="password" placeholder="••••••••" required></div><button class="btn" type="submit">Sign in →</button></form><p class="hint">Demo: demo@demo.com / demo1234</p></div></body></html>
